name: Generate MD5 for addons.xml

on:
  push:
    branches:
      - master
    paths:
      - 'zips/addons.xml'

permissions:
  contents: write

jobs:
  generate-md5:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Fetch only the most recent commit history to keep it lighting fast
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Use native Linux md5sum. Fast, lightweight, no Python setup required.
      # Note: 'awk' strips the trailing filename out of the md5sum command output.
      - name: Generate MD5
        run: |
          md5sum zips/addons.xml | awk '{print $1}' > zips/addons.md5
          echo "Generated MD5: $(cat zips/addons.md5)"
      
      # 3. Pull latest changes before pushing to avoid git rejection errors
      - name: Commit and push MD5 file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet zips/addons.md5; then
            echo "No changes to MD5 file"
          else
            git add zips/addons.md5
            git commit -m "Auto-generate MD5 for addons.xml [skip ci]"
            
            # Rebase ensures your runner pulls any late master commits before pushing
            git pull --rebase origin master
            git push origin master
          fi
