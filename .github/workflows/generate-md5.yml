name: Pages build and deployment

on:
  push:
    branches:
      - master
    paths:
      # Only rebuild Pages when site-facing content changes
      - "repository.adamsbuilds/**"
      - ".nojekyll"
      - "index.html"
      - "404.html"
      - "assets/**"
      - "css/**"
      - "js/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel older runs when newer commits arrive (faster feedback on latest commit)
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # If your site is already static files in repository.adamsbuilds/,
      # upload that folder directly.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repository.adamsbuilds

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
